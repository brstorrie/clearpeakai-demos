<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dakota's Garage And Mobile Auto Repair | San Tan Valley, AZ</title>
<meta name="description" content="Dakota's Garage And Mobile Auto Repair - 5-star mobile mechanic serving San Tan Valley, Arizona. We come to you! Call (520) 705-9237">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --charcoal: #1a1a2e;
    --charcoal-light: #16213e;
    --orange: #e8490f;
    --orange-light: #ff6b35;
    --orange-glow: rgba(232,73,15,0.15);
    --silver: #c0c0c0;
    --silver-light: #e8e8e8;
    --white: #ffffff;
    --off-white: #f5f5f0;
    --text-dark: #1a1a2e;
    --text-mid: #4a4a6a;
    --text-light: #8888aa;
    --card-bg: #0d1117;
    --border: rgba(255,255,255,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Work Sans', sans-serif;
    background: var(--charcoal);
    color: var(--white);
    overflow-x: hidden;
    line-height: 1.6;
  }

  h1, h2, h3, h4, h5 {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.02em;
  }

  a { text-decoration: none; color: inherit; }

  img { max-width: 100%; display: block; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--charcoal); }
  ::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 3px; }

  /* ===== NAVBAR ===== */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 72px;
    background: rgba(13, 17, 23, 0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  .navbar.scrolled {
    height: 62px;
    background: rgba(10, 13, 20, 0.98);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-logo-icon {
    width: 42px;
    height: 42px;
    background: var(--orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .nav-logo-text .brand-main {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .nav-logo-text .brand-sub {
    font-size: 10px;
    font-weight: 500;
    color: var(--orange);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--silver-light);
    transition: color 0.2s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 2px;
    background: var(--orange);
    transition: width 0.3s ease;
  }

  .nav-links a:hover { color: var(--white); }
  .nav-links a:hover::after { width: 100%; }

  .nav-cta {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--orange);
    color: var(--white) !important;
    padding: 10px 22px;
    border-radius: 6px;
    font-family: 'Oswald', sans-serif;
    font-size: 14px !important;
    font-weight: 600;
    letter-spacing: 0.08em;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta::after { display: none !important; }
  .nav-cta:hover { background: var(--orange-light) !important; transform: translateY(-1px); color: var(--white) !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--white);
    transition: all 0.3s;
    border-radius: 2px;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px; left: 0; right: 0;
    background: rgba(10,13,20,0.98);
    backdrop-filter: blur(20px);
    padding: 24px 40px 32px;
    z-index: 999;
    border-bottom: 1px solid var(--border);
    transform: translateY(-10px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .mobile-menu.open {
    display: block;
    transform: translateY(0);
    opacity: 1;
  }

  .mobile-menu ul { list-style: none; }

  .mobile-menu ul li {
    border-bottom: 1px solid var(--border);
  }

  .mobile-menu ul li a {
    display: block;
    padding: 14px 0;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--silver-light);
    transition: color 0.2s;
  }

  .mobile-menu ul li a:hover { color: var(--orange); }

  .mobile-menu-cta {
    margin-top: 20px;
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?w=1920&h=1080&fit=crop');
    background-size: cover;
    background-position: center;
    transform: scale(1.05);
    transition: transform 8s ease;
  }

  .hero-bg.loaded { transform: scale(1); }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      rgba(10,13,20,0.95) 0%,
      rgba(26,26,46,0.85) 50%,
      rgba(10,13,20,0.6) 100%
    );
  }

  .hero-overlay-stripe {
    position: absolute;
    top: 0; bottom: 0;
    left: 0;
    width: 5px;
    background: var(--orange);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1280px;
    margin: 0 auto;
    padding: 140px 40px 100px;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--orange-glow);
    border: 1px solid rgba(232,73,15,0.4);
    border-radius: 100px;
    padding: 8px 18px;
    margin-bottom: 28px;
  }

  .hero-badge-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--orange-light);
  }

  .hero-stars {
    display: flex;
    gap: 3px;
  }

  .hero-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(48px, 6vw, 88px);
    font-weight: 700;
    line-height: 1.0;
    text-transform: uppercase;
    color: var(--white);
    max-width: 780px;
    margin-bottom: 8px;
  }

  .hero-title .accent {
    color: var(--orange);
    display: block;
  }

  .hero-title .outline {
    -webkit-text-stroke: 2px var(--white);
    color: transparent;
    display: block;
  }

  .hero-tagline {
    font-size: clamp(16px, 2vw, 20px);
    font-weight: 300;
    color: var(--silver-light);
    max-width: 560px;
    margin: 20px 0 40px;
    line-height: 1.7;
  }

  .hero-tagline strong {
    color: var(--orange-light);
    font-weight: 600;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 60px;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--orange);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px 36px;
    border-radius: 8px;
    border: 2px solid var(--orange);
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 4px 24px rgba(232,73,15,0.35);
  }

  .btn-primary:hover {
    background: var(--orange-light);
    border-color: var(--orange-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(232,73,15,0.5);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px 36px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .btn-secondary:hover {
    border-color: var(--white);
    background: rgba(255,255,255,0.08);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
  }

  .hero-stat {
    padding: 0 36px 0 0;
    border-right: 1px solid rgba(255,255,255,0.15);
    margin-right: 36px;
  }

  .hero-stat:last-child {
    border-right: none;
    margin-right: 0;
    padding-right: 0;
  }

  .hero-stat-num {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--orange);
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--silver);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .hero-scroll {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: bounce 2s infinite;
  }

  .hero-scroll-text {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--silver);
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* ===== SECTION STYLES ===== */
  .section {
    padding: 100px 40px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .section-full {
    padding: 100px 0;
  }

  .section-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-label-line {
    width: 36px;
    height: 2px;
    background: var(--orange);
  }

  .section-label-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
  }

  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .section-title .highlight { color: var(--orange); }

  .section-desc {
    font-size: 16px;
    color: var(--text-light);
    max-width: 580px;
    line-height: 1.75;
  }

  /* ===== ANNOUNCEMENT BAR ===== */
  .announcement {
    background: var(--orange);
    padding: 12px 40px;
    text-align: center;
    position: relative;
    z-index: 999;
    margin-top: 72px;
  }

  .announcement p {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
  }

  .announcement a {
    color: var(--white);
    text-decoration: underline;
    margin-left: 8px;
  }

  /* ===== SERVICES ===== */
  .services-section {
    background: var(--card-bg);
    padding: 100px 0;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 60px;
  }

  .service-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.35s ease;
    position: relative;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
    transform: scaleX(0);
    transition: transform 0.35s ease;
    transform-origin: left;
  }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(232,73,15,0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .service-card:hover::before { transform: scaleX(1); }

  .service-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    filter: brightness(0.85) saturate(0.9);
    transition: filter 0.35s ease;
  }

  .service-card:hover .service-img {
    filter: brightness(1) saturate(1.1);
  }

  .service-body {
    padding: 28px;
  }

  .service-icon-wrap {
    width: 48px;
    height: 48px;
    background: var(--orange-glow);
    border: 1px solid rgba(232,73,15,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .service-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 10px;
  }

  .service-desc {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .service-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--orange);
    transition: gap 0.2s;
  }

  .service-link:hover { gap: 12px; }

  /* ===== WHY CHOOSE US ===== */
  .why-section {
    background: linear-gradient(135deg, var(--charcoal-light) 0%, var(--charcoal) 100%);
    padding: 100px 0;
    position: relative;
    overflow: hidden;
  }

  .why-bg-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(80px, 15vw, 200px);
    font-weight: 700;
    text-transform: uppercase;
    color: rgba(255,255,255,0.02);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    margin-top: 60px;
  }

  .why-image-wrap {
    position: relative;
  }

  .why-image {
    width: 100%;
    height: 480px;
    object-fit: cover;
    border-radius: 16px;
    filter: brightness(0.9);
  }

  .why-image-badge {
    position: absolute;
    bottom: -24px;
    right: -24px;
    width: 130px;
    height: 130px;
    background: var(--orange);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 40px rgba(232,73,15,0.5);
  }

  .why-image-badge .badge-num {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }

  .why-image-badge .badge-text {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    padding: 0 12px;
    line-height: 1.3;
    margin-top: 4px;
  }

  .why-features {
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-top: 40px;
  }

  .why-feature {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .why-feature-icon {
    width: 52px;
    height: 52px;
    background: var(--orange-glow);
    border: 1px solid rgba(232,73,15,0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .why-feature-text h4 {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 6px;
  }

  .why-feature-text p {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.7;
  }

  /* ===== ABOUT ===== */
  .about-section {
    background: var(--card-bg);
    padding: 100px 0;
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    margin-top: 0;
  }

  .about-content { }

  .about-image-wrap {
    position: relative;
    order: -1;
  }

  .about-image {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 16px;
    object-position: center top;
  }

  .about-image-frame {
    position: absolute;
    top: -16px;
    left: -16px;
    right: 16px;
    bottom: 16px;
    border: 2px solid var(--orange);
    border-radius: 16px;
    pointer-events: none;
    opacity: 0.4;
  }

  .about-text {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    line-height: 1.8;
    margin: 20px 0;
  }

  .about-highlights {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 32px 0;
  }

  .about-highlight {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--silver-light);
  }

  .about-highlight-dot {
    width: 8px;
    height: 8px;
    background: var(--orange);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .about-phone-block {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--orange-glow);
    border: 1px solid rgba(232,73,15,0.3);
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 32px;
  }

  .about-phone-icon {
    width: 52px;
    height: 52px;
    background: var(--orange);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .about-phone-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 4px;
  }

  .about-phone-num {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  /* ===== SERVICE AREA ===== */
  .area-section {
    background: linear-gradient(180deg, var(--charcoal) 0%, var(--charcoal-light) 100%);
    padding: 100px 0;
    position: relative;
  }

  .area-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
    margin-top: 60px;
  }

  .area-map {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    height: 420px;
    position: relative;
  }

  .area-map iframe {
    width: 100%;
    height: 100%;
    border: none;
    filter: brightness(0.85) saturate(0.8) hue-rotate(200deg);
  }

  .area-list-title {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 24px;
  }

  .area-cities {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
  }

  .area-city {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--silver-light);
    transition: all 0.2s;
  }

  .area-city:hover {
    border-color: rgba(232,73,15,0.4);
    color: var(--white);
    background: var(--orange-glow);
  }

  .area-city-dot {
    width: 6px;
    height: 6px;
    background: var(--orange);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .area-cta-box {
    background: var(--orange);
    border-radius: 12px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .area-cta-box h4 {
    font-family: 'Oswald', sans-serif;

    align-items: center;
    gap: 12px;
    background: var(--orange);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 16px;

    padding: 14px 24px;

    box-shadow: 0 6px 28px rgba(232,73,15,0.5);

    transition: all 0.25s;
    border: none;
    text-decoration: none;

  .sticky-phone-btn:hover {
    background: var(--orange-light);
    transform: translateY(-2px);
    box-shadow: 0 10px 36px rgba(232,73,15,0.6);
  }

  .sticky-phone-pulse {
    position: absolute;
    top: -4px; right: -4px;
    width: 14px; height: 14px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid #080b0f;
  }

  .sticky-phone-pulse::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid #4ade80;
    animation: pulse-ring 2s infinite;
  }

  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }

  @media (max-width: 1100px) {

    .testimonials-grid {

    .footer-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (max-width: 900px) {
    .nav-links { display: none; }
    .nav-cta { display: none; }
    .hamburger { display: flex; }

    .why-grid,
    .about-grid,
    .area-grid,
    .contact-grid {
      grid-template-columns: 1fr;
      gap: 48px;
    }

    .about-image-wrap { order: 0; }

    .why-image-badge {

    .contact-grid { gap: 40px; }

    .form-row { grid-template-columns: 1fr; }

    .footer-grid { grid-template-columns: 1fr 1fr; gap: 36px; }
    .footer-bottom { flex-direction: column; align-items: flex-start; }
  }

  @media (max-width: 640px) {
    .section { padding: 72px 24px; }
    .section-full { padding: 72px 0; }
    .section-inner { padding: 0 24px; }
    .navbar { padding: 0 24px; }
    .announcement { padding: 10px 24px; }

    .hero-content { padding: 120px 24px 80px; }
    .hero-stats { gap: 0; }
    .hero-stat { padding: 0 24px 0 0; margin-right: 24px; }

    .services-grid { grid-template-columns: 1fr; }
    .testimonials-grid { grid-template-columns: 1fr; }

    .footer-grid { grid-template-columns: 1fr; }
    .footer { padding: 48px 0 0; }
    .footer-grid { padding: 0 24px; }
    .footer-bottom { padding: 20px 24px; }
    .footer-badges { flex-wrap: wrap; }

    .about-highlights { grid-template-columns: 1fr; }
    .area-cities { grid-template-columns: 1fr; }
    .rating-cta { align-items: flex-start; }
    .testimonials-rating-bar { flex-direction: column; }

    .hero-actions { flex-direction: column; }
    .btn-primary, .btn-secondary { justify-content: center; }

    .phone-bar { padding: 40px 24px; }

    .sticky-phone-btn { padding: 12px 18px; font-size: 14px; }

    .why-image { height: 320px; }
    .about-image { height: 320px; }
  }

  @media (max-width: 400px) {
    .hero-title { font-size: 40px; }
    .hero-stat { padding: 0 18px 0 0; margin-right: 18px; }
    .hero-stat-num { font-size: 28px; }
  }
</style>
